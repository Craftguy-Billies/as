name = "vibecoder"
main = "worker.js"
compatibility_date = "2025-03-01"

# KV namespace for state persistence
# CREATE THIS in Cloudflare Dashboard → Workers & Pages → KV → Create namespace
# Then replace the id below with your new namespace ID.
kv_namespaces = [
  { binding = "VIBECODE", id = "YOUR_KV_NAMESPACE_ID" }
]

# Environment variables (secrets should use wrangler secret put instead)
[vars]
LLM_MODEL = "deepseek/deepseek-v4-flash"

# Cron trigger: polls active queues every minute so batch continues even when app is closed
[triggers]
crons = ["* * * * *"]
